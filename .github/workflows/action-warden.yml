name: Action Warden — Enforce SHA-Pinned Actions

on:
  pull_request:
    paths:
      - '.github/workflows/**'
      - '.github/aw/**'
  push:
    branches: [main]
    paths:
      - '.github/workflows/**'
      - '.github/aw/**'

permissions:
  contents: read

jobs:
  enforce-sha-pins:
    name: Verify actions are SHA-pinned
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Enforce SHA-pinned actions
        id: check
        shell: bash
        run: |
          LOCKFILE=".github/aw/actions-lock.json"
          VIOLATIONS=0
          FIXES=""

          # Build a map of allowed SHAs from the lock file
          declare -A ALLOWED_SHAS
          declare -A TAG_TO_SHA
          for key in $(jq -r '.entries | keys[]' "$LOCKFILE"); do
            sha=$(jq -r --arg k "$key" '.entries[$k].sha' "$LOCKFILE")
            ALLOWED_SHAS["$sha"]=1
            TAG_TO_SHA["$key"]="$sha"
          done

          echo "### Action Warden Report" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          # Scan all workflow files for 'uses:' lines
          for workflow in .github/workflows/*.yml .github/workflows/*.yaml; do
            [ -f "$workflow" ] || continue

            while IFS= read -r line; do
              # Extract the action reference from 'uses:' lines
              ref=$(echo "$line" | grep -oP 'uses:\s*\K\S+')
              [ -z "$ref" ] && continue

              # Split into action and version (action@version)
              action=$(echo "$ref" | cut -d'@' -f1)
              version=$(echo "$ref" | cut -d'@' -f2)

              # Skip local actions (paths starting with ./)
              [[ "$action" == ./* ]] && continue

              # Check if version looks like a SHA (40 hex chars)
              if [[ "$version" =~ ^[0-9a-f]{40}$ ]]; then
                if [[ -n "${ALLOWED_SHAS[$version]+x}" ]]; then
                  echo "✅ $workflow — $action@${version:0:12}..." >> "$GITHUB_STEP_SUMMARY"
                else
                  echo "⚠️  $workflow — $action@${version:0:12}... (SHA not in lock file)" >> "$GITHUB_STEP_SUMMARY"
                  VIOLATIONS=$((VIOLATIONS + 1))
                fi
              else
                echo "❌ $workflow — $action@$version (uses tag, not SHA)" >> "$GITHUB_STEP_SUMMARY"
                # Look up the fix from the lock file (try exact, then with/without v prefix)
                lock_key="$action@$version"
                if [[ -z "${TAG_TO_SHA[$lock_key]+x}" ]]; then
                  if [[ "$version" == v* ]]; then
                    lock_key="$action@${version#v}"
                  else
                    lock_key="$action@v$version"
                  fi
                fi
                if [[ -n "${TAG_TO_SHA[$lock_key]+x}" ]]; then
                  lock_version=$(echo "$lock_key" | cut -d'@' -f2)
                  FIXES+="# $workflow\n"
                  FIXES+="- uses: $action@$version\n"
                  FIXES+="+ uses: $action@${TAG_TO_SHA[$lock_key]} # $lock_version\n\n"
                else
                  FIXES+="# $workflow\n"
                  FIXES+="- uses: $action@$version  (not found in lock file — add it to actions-lock.json)\n\n"
                fi
                VIOLATIONS=$((VIOLATIONS + 1))
              fi
            done < <(grep -nP '^\s+uses:\s' "$workflow")
          done

          echo "" >> "$GITHUB_STEP_SUMMARY"

          if [ "$VIOLATIONS" -gt 0 ]; then
            echo "**$VIOLATIONS violation(s) found.** All actions must use SHA pins from \`.github/aw/actions-lock.json\`." >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "#### Suggested fixes:" >> "$GITHUB_STEP_SUMMARY"
            echo '```diff' >> "$GITHUB_STEP_SUMMARY"
            echo -e "$FIXES" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            echo "::error::$VIOLATIONS action(s) not SHA-pinned. See job summary for details."
            exit 1
          else
            echo "**All actions are properly SHA-pinned.** ✅" >> "$GITHUB_STEP_SUMMARY"
          fi
