name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Using tag version — gh-aw enforcement will FAIL on this
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Build summary
        uses: actions/github-script@v9
        with:
          script: |
            const { owner, repo } = context.repo;
            const sha = context.sha.substring(0, 7);
            const summary = `### Build Info\n- **Repo:** ${owner}/${repo}\n- **SHA:** ${sha}\n- **Branch:** ${context.ref}`;
            await core.summary.addRaw(summary).write();

      - name: Upload build log
        uses: actions/upload-artifact@v7.0.0
        with:
          name: build-log
          path: '**/*.log'
          if-no-files-found: ignore
