name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Using tag version — gh-aw enforcement will FAIL on this
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Build summary
        uses: actions/github-script@373c709c69115d41ff229c7e5df9f8788daa9553 # v9
        with:
          script: |
            const { owner, repo } = context.repo;
            const sha = context.sha.substring(0, 7);
            const summary = `### Build Info\n- **Repo:** ${owner}/${repo}\n- **SHA:** ${sha}\n- **Branch:** ${context.ref}`;
            await core.summary.addRaw(summary).write();

      - name: Upload build log
        uses: actions/upload-artifact@v7.0.0 # v7.0.0 #bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: build-log
          path: '**/*.log'
          if-no-files-found: ignore
